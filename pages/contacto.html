<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Contacto - CinePlus</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">CinePlus</a>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="../index.html">Inicio</a></li>
          <li class="nav-item"><a class="nav-link" href="renta.html">Renta</a></li>
          <li class="nav-item"><a class="nav-link active" href="contacto.html">Contacto</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container py-5">
    <h2 class="mb-4">Contáctanos</h2>
    <form id="form-contacto" novalidate>
      <div class="mb-3">
        <label for="nombre" class="form-label">Nombre</label>
        <input type="text" class="form-control" id="nombre" required>
        <div class="invalid-feedback" id="error-nombre"></div>
      </div>
      <div class="mb-3">
        <label for="correo" class="form-label">Correo electrónico</label>
        <input type="email" class="form-control" id="correo" required>
        <div class="invalid-feedback" id="error-correo"></div>
      </div>
      <div class="mb-3">
        <label for="mensaje" class="form-label">Mensaje</label>
        <textarea class="form-control" id="mensaje" rows="4" required></textarea>
        <div class="invalid-feedback" id="error-mensaje"></div>
      </div>
      <button type="submit" class="btn btn-primary">Enviar</button>
      <div id="alerta" class="alert alert-success mt-3 d-none">Mensaje enviado con éxito.</div>
    </form>
  </div>

  <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
  <script>
    $('#form-contacto').on('submit', function (e) {
      e.preventDefault();
      
      // Limpiar errores previos
      $('.form-control').removeClass('is-invalid');
      $('.invalid-feedback').text('');
      
      let isValid = true;
      
      // Validar nombre
      const nombre = $('#nombre').val().trim();
      if (nombre === '') {
        $('#nombre').addClass('is-invalid');
        $('#error-nombre').text('El nombre es obligatorio.');
        isValid = false;
      } else if (nombre.length < 2) {
        $('#nombre').addClass('is-invalid');
        $('#error-nombre').text('El nombre debe tener al menos 2 caracteres.');
        isValid = false;
      }
      
      // Validar correo
      const correo = $('#correo').val().trim();
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (correo === '') {
        $('#correo').addClass('is-invalid');
        $('#error-correo').text('El correo electrónico es obligatorio.');
        isValid = false;
      } else if (!emailRegex.test(correo)) {
        $('#correo').addClass('is-invalid');
        $('#error-correo').text('Ingresa un correo electrónico válido.');
        isValid = false;
      }
      
      // Validar mensaje
      const mensaje = $('#mensaje').val().trim();
      if (mensaje === '') {
        $('#mensaje').addClass('is-invalid');
        $('#error-mensaje').text('El mensaje es obligatorio.');
        isValid = false;
      } else if (mensaje.length < 20) {
        $('#mensaje').addClass('is-invalid');
        $('#error-mensaje').text('El mensaje debe tener al menos 20 caracteres.');
        isValid = false;
      } else if (mensaje.length > 50) {
        $('#mensaje').addClass('is-invalid');
        $('#error-mensaje').text('El mensaje no puede exceder 50 caracteres.');
        isValid = false;
      }
      
      if (isValid) {
        $('#alerta').removeClass('d-none').hide().fadeIn();
        setTimeout(() => $('#alerta').fadeOut(), 3000);
        this.reset();
      }
    });
  </script>

  <footer class="bg-dark text-center text-white py-3">
    <small>&copy; 2024 CinePlus. Todos los derechos reservados.</small>
  </footer>
</body>
</html>
