<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Detalle de Película</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">CinePlus</a>
        <div class="collapse navbar-collapse">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="../index.html">Inicio</a></li>
            <li class="nav-item"><a class="nav-link" href="renta.html">Renta</a></li>
            <li class="nav-item"><a class="nav-link" href="contacto.html">Contacto</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container py-5" id="detalle-pelicula">
      <div class="text-center mb-4">
        <h2 id="titulo" class="mb-3"></h2>

        <!-- Badge dinámico de estado -->
        <div id="estado-badge" class="mb-3"></div>

        <!-- Componente: Alerta informativa -->
        <div id="estado-alert" class="alert alert-info" role="alert">
          ¡Disfruta del tráiler oficial y conoce más sobre esta película!
        </div>

        <!-- Tráiler embebido -->
        <div class="ratio ratio-16x9 mb-4">
          <iframe id="trailer" src="" allowfullscreen></iframe>
        </div>
      </div>

      <!-- Tarjeta con sinopsis e imagen -->
      <div class="card mb-4">
        <div class="row g-0">
          <div class="col-md-4">
            <img
              id="poster"
              src=""
              class="img-fluid rounded-start"
              alt="Poster de la película"
            />
          </div>
          <div class="col-md-8">
            <div class="card-body">
              <h5 class="card-title">Sinopsis</h5>
              <p id="sinopsis" class="card-text"></p>

              <!-- Componente: Badge de género -->
              <span id="genero" class="badge bg-secondary"></span>

              <!-- Precios -->
              <p class="card-text mt-2"><strong id="precio-actual"></strong></p>
              <p class="card-text"><strong>Estreno:</strong> <span id="estreno"></span></p>
              
            </div>
          </div>
        </div>
      </div>

      <div class="card mb-4">
        <div class="card-body">
          <h5 class="card-title">Reseñas</h5>
          <div id="reseñas-lista">
            <p class="text-muted">Cargando reseñas...</p>
          </div>
        </div>
      </div>

      <div class="text-center">
        <a href="../index.html" class="btn btn-secondary">Volver al inicio</a>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <script>
      $(function () {
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get("id");

        // Cargar géneros primero
        $.ajax({
          url: "../data/generos_pelis.json",
          method: "GET",
          dataType: "json",
          success: function (generos) {
            // Luego cargar películas
            $.ajax({
              url: "../data/peliculas.json",
              method: "GET",
              dataType: "json",
              success: function (peliculas) {
                const peli = peliculas.find((p) => p.id == id);
                if (peli) {
                  $("#titulo").text(peli.titulo);
                  $("#poster").attr("src", "../img/" + peli.imagen);
                  $("#sinopsis").text(peli.sinopsis);
                  $("#trailer").attr("src", peli.trailer);
                  // Mapear géneros
                  let nombresGeneros = peli.generos.map(id => {
                    let genero = generos.find(g => g.id === id);
                    return genero ? genero.nombre : "Desconocido";
                  }).join(", ");
                  $("#genero").text(nombresGeneros);
                  $("#estreno").text(peli.estreno);
                  // Calcular precio basado en fecha
                  let fechaActual = new Date();
                  let fechaEstreno = new Date(peli.estreno);
                  let esEstreno = fechaActual < fechaEstreno;
                  let precioMostrar = esEstreno ? peli.precios.estreno : peli.precios.normal;
                  let etiquetaPrecio = esEstreno ? "Precio estreno" : "Precio normal";
                  $("#precio-actual").text(etiquetaPrecio + ": $" + precioMostrar.toFixed(2));

                  let badgeClass = esEstreno ? "bg-danger" : "bg-success";
                  let badgeText = esEstreno ? "Estreno" : "Cartelera regular";
                  $("#estado-badge").html(`<span class="badge ${badgeClass} fs-6">${badgeText}</span>`);

                  let alertClass = esEstreno ? "alert-warning" : "alert-primary";
                  let estadoTexto = esEstreno ? "Esta película es un estreno. Aprovecha el precio especial: " : "Esta película ya está en cartelera regular. A precio de: ";
                  $("#estado-alert")
                    .removeClass("alert-info alert-warning alert-primary")
                    .addClass(alertClass)
                    .text(`${estadoTexto} $${precioMostrar.toFixed(2)}`);

                  cargarResenas(peli.id, esEstreno);
                } else {
                  mostrarError();
                }
              },
              error: function () {
                mostrarError();
              },
            });
          },
          error: function () {
            mostrarError();
          },
        });

        function mostrarError() {
          $("#detalle-pelicula").html(`
          <div class="alert alert-danger text-center" role="alert">
            No se pudo cargar la información de la película.
          </div>
          <div class="text-center">
            <a href="../index.html" class="btn btn-secondary mt-3">Volver al inicio</a>
          </div>
        `);
        }

        function cargarResenas(peliculaId, esEstreno) {
          if (esEstreno) {
            $("#reseñas-lista").html(
              '<p class="text-muted">Esta película está de estreno y aún no tiene reseñas.</p>'
            );
            return;
          }

          $.ajax({
            url: "../data/reseñas.json",
            method: "GET",
            dataType: "json",
            success: function (reseñas) {
              let reseñasPorPelicula = reseñas.filter((r) => r.movieId == peliculaId);
              if (reseñasPorPelicula.length === 0) {
                $("#reseñas-lista").html(
                  '<p class="text-muted">Aún no hay reseñas para esta película.</p>'
                );
                return;
              }

              let html = reseñasPorPelicula
                .map((reseña) => {
                  return `
                    <div class="mb-3 border rounded p-3">
                      <div class="d-flex justify-content-between align-items-center mb-2">
                        <strong>${reseña.nombre}</strong>
                        <span>${renderEstrellas(reseña.calificacion)}</span>
                      </div>
                      <p class="mb-1">${reseña.comentario}</p>
                      <small class="text-muted">${reseña.fecha}</small>
                    </div>`;
                })
                .join("");

              $("#reseñas-lista").html(html);
            },
            error: function () {
              $("#reseñas-lista").html(
                '<p class="text-danger">No se pudieron cargar las reseñas.</p>'
              );
            },
          });
        }

        function renderEstrellas(valor) {
          let estrellas = "";
          for (let i = 1; i <= 5; i++) {
            estrellas += i <= valor ? "★" : "☆";
          }
          return `<span class="text-warning">${estrellas}</span>`;
        }
      });
    </script>
  </body>
</html>
